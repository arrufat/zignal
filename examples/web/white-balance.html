<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>White Balance</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="header">
      <h1>White Balance</h1>
      <p>Real-time white balance correction on webcam feed with customizable reference color</p>
    </div>
    <div class="instructions">
      Real-time white balance on your webcam. Pick a reference color for custom correction, or turn on gray-world for automatic estimation.
    </div>
    <div id="image-container">
      <video id="video" style="display:none;"></video>
      <canvas id="canvas-webcam"></canvas>
    </div>
    <div class="controls">
      <div id="wb-controls">
        <input type="color" id="colorPicker" value="#ffffff" title="Reference color" aria-label="Reference color">
        <div id="wb-toggles">
          <div id="wb-toggle-slot"></div>
          <div id="grayworld-slot"></div>
        </div>
      </div>
    </div>
    <script src="utils.js"></script>
    <script>
      const video = document.getElementById('video');
    const canvas = document.getElementById('canvas-webcam');
    const ctx = canvas.getContext('2d');
    const { createRadioGroup } = window.ZignalUtils;
    const colorPicker = document.getElementById('colorPicker');
    let isBalanced = true;
    let isGrayWorld = false;
    let refColor = 0xffffff;
    let wasmExports = undefined;
    const textDecoder = new TextDecoder();
    let rgbaPtr = null;
    let rgbaSize = 0;

    const onOff = [
      { value: 'on', label: 'On' },
      { value: 'off', label: 'Off' },
    ];

    const wbToggle = createRadioGroup({
      label: 'White balance', name: 'wb', options: onOff, value: 'on', disabled: false,
      onChange: (v) => { isBalanced = v === 'on'; updateUI(); },
    });
    document.getElementById('wb-toggle-slot').appendChild(wbToggle.element);

    const grayWorldToggle = createRadioGroup({
      label: 'Gray-world', name: 'grayworld', options: onOff, value: 'off', disabled: false,
      onChange: (v) => { isGrayWorld = v === 'on'; updateUI(); },
    });
    document.getElementById('grayworld-slot').appendChild(grayWorldToggle.element);

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
        video.play();
      })
      .catch(err => console.error('Error accessing webcam:', err));

    video.addEventListener('loadedmetadata', () => {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
    });

    function decodeString(ptr, len) {
      if (len === 0) return "";
      return textDecoder.decode(new Uint8Array(wasmExports.memory.buffer, ptr, len));
    }

    WebAssembly.instantiateStreaming(fetch("whitebalance.wasm"), {
      js: {
        log: function (ptr, len) {
          const msg = decodeString(ptr, len);
          console.log(msg);
        },
        now: function () {
          return performance.now();
        },
      },
    }).then(function (obj) {
      wasmExports = obj.instance.exports;
      window.wasm = obj;

      function process() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
          if (rgbaPtr === null && canvas.width > 0 && canvas.height > 0) {
            rgbaSize = canvas.width * canvas.height * 4;
            rgbaPtr = wasmExports.alloc(rgbaSize);
            if (rgbaPtr < 0) {
              console.error('Failed to allocate memory:', rgbaPtr);
            }
          }
          if (rgbaPtr !== null) {
            let rgba = new Uint8ClampedArray(wasmExports.memory.buffer, rgbaPtr, rgbaSize);

            // Mirror the camera image horizontally
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();

            if (isBalanced) {
              let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
              rgba.set(imageData.data);
              wasmExports.whitebalance(rgbaPtr, canvas.height, canvas.width, refColor, isGrayWorld ? 1 : 0);
              imageData.data.set(rgba);
              ctx.putImageData(imageData, 0, 0);
            }
          }
        }
        requestAnimationFrame(process);
      }

      requestAnimationFrame(process);
    });

    colorPicker.addEventListener('input', () => {
      refColor = parseInt(colorPicker.value.slice(1), 16);
    });

    function updateUI() {
      // Gray-world is only meaningful when white balance is on; the reference
      // color only matters in custom (non-gray-world) mode.
      grayWorldToggle.setDisabled(!isBalanced);
      colorPicker.disabled = !isBalanced || isGrayWorld;
    }

    updateUI();
    </script>
  </body>
</html>
