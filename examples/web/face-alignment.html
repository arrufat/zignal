<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Face Alignment</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="favicon.png">
  </head>
  <body>
    <div class="header">
      <h1>Face Alignment</h1>
      <p>Detect faces in real-time and extract aligned face crops for further processing</p>
    </div>

    <div id="image-container">
      <div class="scan-stage">
        <video id="video" width="1" height="1" style="display:none"></video>
        <canvas id="canvas-webcam" width="640" height="480"></canvas>
        <div class="scan-placeholder">
          <svg class="icon" viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 8a2 2 0 0 1 2-2h2l1.5-2h7L17 6h2a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <circle cx="12" cy="13" r="3.5"/>
          </svg>
          <span>Switch to Camera,<br>or click / drop an image here</span>
        </div>
      </div>
      <fieldset class="settings-container">
        <div id="form">
          <div id="mode-row">
            <div id="mode-select-slot"></div>
            <button id="align-button">Align</button>
          </div>
          <canvas id="canvas-face" width="256" height="256"></canvas>
          <div id="buttons-container">
            <div class="padding-slider">
              <label for="padding-range">padding:</label>
              <input type="range" min="0" max="100" value="25" class="slider" name="padding-range">
              <label for="padding-range"><code><span name="padding"></span></code></label>
            </div>
            <div class="blurring-slider">
              <label for="blurring-range">blurring:</label>
              <input type="range" min="-50" max="50" value="0" class="slider" name="blurring-range">
              <label for="blurring-range"><code><span name="blurring"></span></code></label>
            </div>
          </div>
          <p id="size"></p>
          <p id="time"></p>
        </div>
      </fieldset>
      <script src="utils.js"></script>
      <script src="./face-alignment.js"></script>
    </div>
  </body>
</html>
